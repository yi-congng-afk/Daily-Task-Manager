<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Work Task Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F172A;--surface:#1E293B;--surface2:#273549;--surface3:#2E3F56;
  --border:#334155;--border2:#475569;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#64748B;
  --teal:#14B8A6;--teal-d:#0F766E;--teal-dk:#042F2E;
  --coral:#F97316;--coral-d:#C2410C;--coral-dk:#431407;
  --pink:#EC4899;--pink-d:#BE185D;--pink-dk:#500724;
  --blue:#3B82F6;--blue-d:#1D4ED8;--blue-dk:#1E3A5F;
  --green:#22C55E;--green-d:#15803D;--green-dk:#052E16;
  --amber:#F59E0B;--amber-d:#B45309;--amber-dk:#451a03;
  --purple:#A78BFA;--purple-d:#6D28D9;--purple-dk:#2e1065;
  --radius:10px;--radius-sm:6px;
  --s-done-bg:#052E16;--s-done-fg:#4ADE80;
  --s-prog-bg:#1E3A5F;--s-prog-fg:#60A5FA;
  --s-pend-bg:#422006;--s-pend-fg:#FCD34D;
  --s-canc-bg:#3B0764;--s-canc-fg:#C084FC;
  --p-high-bg:#450A0A;--p-high-fg:#F87171;
  --p-med-bg:#422006;--p-med-fg:#FCD34D;
  --p-low-bg:#052E16;--p-low-fg:#4ADE80;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:54px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:nowrap}
.topbar-logo{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px;white-space:nowrap}
.topbar-logo span{color:var(--teal)}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal-d)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:#7F1D1D;color:#FCA5A5}.btn-danger:hover{background:#991B1B}
.btn-sm{padding:5px 10px;font-size:12px}

/* TABS */
.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:11px 14px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;user-select:none}
.tab:hover{color:var(--text2)}.tab.active{color:var(--text);border-bottom-color:var(--teal)}

/* MONTH FILTER BAR */
.month-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.month-bar-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.month-pills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.mpill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);color:var(--text3);transition:all .15s;white-space:nowrap}
.mpill:hover{border-color:var(--teal);color:var(--teal)}
.mpill.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.mpill.all{border-color:var(--border2)}
.year-select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;color:var(--text);font-size:12px;outline:none;cursor:pointer}

/* CONTENT */
.content{padding:20px;max-width:1600px;margin:0 auto}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.kpi-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.kpi-value{font-size:30px;font-weight:700;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.kpi-card.k-done .kpi-value{color:var(--green)}.kpi-card.k-prog .kpi-value{color:var(--blue)}.kpi-card.k-pend .kpi-value{color:var(--amber)}

/* MONTH OVERVIEW GRID */
.month-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:18px}
.mo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .15s}
.mo-card:hover{border-color:var(--teal)}
.mo-card.mo-active{border-color:var(--teal);background:var(--teal-dk)}
.mo-month{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.mo-month span{font-size:11px;color:var(--text3);font-weight:400}
.mo-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mo-stat{border-radius:6px;padding:6px 8px;text-align:center}
.mo-stat-val{font-size:16px;font-weight:700}
.mo-stat-lbl{font-size:10px;margin-top:1px}
.mo-bar{height:4px;border-radius:2px;margin-top:10px;background:var(--border);overflow:hidden}
.mo-bar-fill{height:100%;border-radius:2px;background:var(--teal);transition:width .3s}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.chart-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.chart-panel h3{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--text2);width:90px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:20px;background:var(--surface2);border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .4s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.bar-fill span{font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
.bar-zero{font-size:11px;color:var(--text3);position:absolute;left:8px;top:50%;transform:translateY(-50%)}

/* DASH GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dash-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.dash-panel h3{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.dash-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:4px}
.dash-row-label{font-size:13px;font-weight:500}
.dash-row-val{font-size:13px;font-weight:700;min-width:28px;text-align:right}

/* TABLE */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:15px;font-weight:600}
.filters-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;width:180px}
.search-box input::placeholder{color:var(--text3)}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);font-size:13px;outline:none;cursor:pointer}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);padding:9px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{padding:9px 13px;font-size:13px;color:var(--text);vertical-align:middle}
.td-title{font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-desc{color:var(--text2);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.td-num{color:var(--text3);font-size:12px;width:32px}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-state .e-icon{font-size:36px;margin-bottom:10px}
.empty-state p{font-size:13px;margin-bottom:14px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-done{background:var(--s-done-bg);color:var(--s-done-fg)}
.badge-prog{background:var(--s-prog-bg);color:var(--s-prog-fg)}
.badge-pend{background:var(--s-pend-bg);color:var(--s-pend-fg)}
.badge-canc{background:var(--s-canc-bg);color:var(--s-canc-fg)}
.badge-high{background:var(--p-high-bg);color:var(--p-high-fg)}
.badge-med{background:var(--p-med-bg);color:var(--p-med-fg)}
.badge-low{background:var(--p-low-bg);color:var(--p-low-fg)}
.badge-teal{background:var(--teal-dk);color:var(--teal)}
.badge-coral{background:var(--coral-dk);color:var(--coral)}
.badge-pink{background:var(--pink-dk);color:var(--pink)}
.badge-blue{background:var(--blue-dk);color:var(--blue)}
.badge-purple{background:var(--purple-dk);color:var(--purple)}
.badge-amber{background:var(--amber-dk);color:var(--amber)}

/* ROW ACTIONS */
.row-actions{display:flex;gap:5px;opacity:0;transition:opacity .15s}
tbody tr:hover .row-actions{opacity:1}
.row-btn{background:var(--surface3);border:1px solid var(--border2);border-radius:4px;color:var(--text2);padding:3px 8px;font-size:11px;cursor:pointer}
.row-btn:hover{color:var(--text);background:var(--surface)}
.row-btn.del:hover{color:#F87171;border-color:#7F1D1D}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{background:var(--surface2);border:none;color:var(--text2);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--surface3);color:var(--text)}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal)}
.form-group textarea{resize:vertical;min-height:68px}
.form-group select option{background:var(--surface2)}

/* NOTES + VENDORS */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;cursor:pointer;transition:border-color .15s}
.note-card:hover{border-color:var(--border2)}
.note-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.note-card-title{font-size:13px;font-weight:600}
.note-card-body{font-size:12px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.note-card-footer{margin-top:9px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.vendor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.vendor-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;cursor:pointer;transition:border-color .15s}
.vendor-card:hover{border-color:var(--border2)}
.vendor-name{font-size:14px;font-weight:600;margin-bottom:3px}
.vendor-service{font-size:12px;color:var(--teal);margin-bottom:9px}
.vendor-info-row{display:flex;gap:6px;font-size:12px;color:var(--text2);margin-bottom:3px}
.vendor-info-row span:first-child{color:var(--text3);min-width:62px}

/* SECTION DESC */
.section-desc{font-size:12px;color:var(--text3);margin-bottom:12px;padding:9px 13px;background:var(--surface);border-radius:var(--radius-sm);border-left:3px solid var(--teal)}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 16px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.t-success{border-left:3px solid var(--green)}
.toast.t-error{border-left:3px solid #F87171}

/* OVERDUE highlight */
.overdue-row{background:#1c0a0a !important}
.overdue-row:hover{background:#2a0f0f !important}

@media(max-width:768px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .dash-grid,.charts-row{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  td,thead th{padding:7px 9px}
  .month-overview{grid-template-columns:1fr 1fr}
}
</style>
</head>

</div>

<div class="content" id="mainContent"></div>

<div class="modal-overlay hidden" id="modalOverlay">

</div>
<div class="toast" id="toast"></div>

// ═══════════════════════════════════════════
// FILTER STATE
// ═══════════════════════════════════════════
let currentTab='dashboard';
let activeYear=new Date().getFullYear();
let activeMonth='all'; // 'all' or 0-11

function getTaskDate(t){
  // primary = dueDate, fallback = startDate, eventDate, publishDate
  return t.dueDate||t.startDate||t.eventDate||t.publishDate||'';
}

function matchesMonthFilter(t){
  if(activeMonth==='all') return true;
  const d=getTaskDate(t);
  if(!d) return false;
  const dt=new Date(d);
  return dt.getFullYear()===activeYear && dt.getMonth()===activeMonth;
}

function getAvailableYears(){
  const years=new Set();
  const now=new Date().getFullYear();
  years.add(now);years.add(now-1);years.add(now+1);
  DB.tasks.forEach(t=>{const d=getTaskDate(t);if(d)years.add(new Date(d).getFullYear());});
  return [...years].sort((a,b)=>a-b);
}

// MONTH BAR
// ═══════════════════════════════════════════
function buildMonthBar(){
  const bar=document.getElementById('monthBar');
  const showBar=['all','events','social','design'].includes(currentTab);
  bar.style.display=showBar?'flex':'none';
  if(!showBar) return;

  // year select
  const ys=document.getElementById('yearSelect');
  const years=getAvailableYears();
  ys.innerHTML=years.map(y=>`<option value="${y}"${y===activeYear?'selected':''}>${y}</option>`).join('');

  // month pills — count tasks per month
  const counts=Array(12).fill(0);
  DB.tasks.forEach(t=>{
    const d=getTaskDate(t);
    if(!d) return;
    const dt=new Date(d);
    if(dt.getFullYear()===activeYear) counts[dt.getMonth()]++;
  });

  const pills=document.getElementById('monthPills');
  pills.innerHTML=`<span class="mpill all ${activeMonth==='all'?'active':''}" onclick="setMonth('all')">All Months</span>`+
    MONTHS_SHORT.map((m,i)=>`<span class="mpill ${activeMonth===i?'active':''}" onclick="setMonth(${i})">${m}${counts[i]?` <b style="font-size:10px">${counts[i]}</b>`:''}</span>`).join('');
}

function setMonth(m){
  activeMonth=m;
  buildMonthBar();
  renderContent();
}
function onYearChange(){
  activeYear=parseInt(document.getElementById('yearSelect').value);
  buildMonthBar();
  renderContent();
}

// BADGES
// ═══════════════════════════════════════════
function statusBadge(s){
  const m={Completed:'done','In Progress':'prog',Pending:'pend',Cancelled:'canc','Design Approved':'done','Sent to Vendor':'prog',Printed:'done'};
  return`<span class="badge badge-${m[s]||'pend'}">${s}</span>`;
}
function priorityBadge(p){
  return`<span class="badge badge-${p==='High'?'high':p==='Low'?'low':'med'}">${p}</span>`;
}
function catBadge(c){
  const m={'Event':'teal','Social Media':'coral','Design & Print':'pink'};
  return`<span class="badge badge-${m[c]||'blue'}">${c}</span>`;
}
function typeBadge(t,color='blue'){return`<span class="badge badge-${color}">${t}</span>`;}

// ═══════════════════════════════════════════
// KPI
// ═══════════════════════════════════════════
function getKPIs(tasks){
  return{
    total:tasks.length,
    done:tasks.filter(x=>['Completed','Printed'].includes(x.status)).length,
    prog:tasks.filter(x=>['In Progress','Design Approved','Sent to Vendor'].includes(x.status)).length,
    pend:tasks.filter(x=>x.status==='Pending').length,
    canc:tasks.filter(x=>x.status==='Cancelled').length,
    events:tasks.filter(x=>x.category==='Event').length,
    social:tasks.filter(x=>x.category==='Social Media').length,
    design:tasks.filter(x=>x.category==='Design & Print').length,
  };
}

// ═══════════════════════════════════════════
// MONTHLY OVERVIEW DATA
// ═══════════════════════════════════════════
function getMonthlyData(year){
  const result=[];
  for(let m=0;m<12;m++){
    const tasks=DB.tasks.filter(t=>{
      const d=getTaskDate(t);
      if(!d)return false;
      const dt=new Date(d);
      return dt.getFullYear()===year&&dt.getMonth()===m;
    });
    if(tasks.length>0||m<=new Date().getMonth()){
      const k=getKPIs(tasks);
      result.push({month:m,name:MONTHS[m],short:MONTHS_SHORT[m],...k});
    }
  }
  return result;
}

// GENERIC TASK TABLE
// ═══════════════════════════════════════════
function renderTaskRows(tasks,extraCols,tbodyId,withFilters=true){
  const sid='s'+Math.random().toString(36).slice(2,7);
  const fid='f'+Math.random().toString(36).slice(2,7);
  const tid=tbodyId||'t'+Math.random().toString(36).slice(2,7);

  if(withFilters){
    setTimeout(()=>{
      const si=document.getElementById(sid),fi=document.getElementById(fid);
      if(si)si.addEventListener('input',()=>filterTable(tid,si.value,fi?fi.value:'all'));
      if(fi)fi.addEventListener('change',()=>filterTable(tid,document.getElementById(sid)?.value||'',fi.value));
    },40);
  }

  const today=new Date();today.setHours(0,0,0,0);
  const rows=tasks.map((t,i)=>{
    const isOverdue=!['Completed','Cancelled','Printed'].includes(t.status)&&t.dueDate&&new Date(t.dueDate)<today;
    return`<tr class="${isOverdue?'overdue-row':''}" data-status="${t.status}" data-search="${(t.title+t.desc+t.assignedTo).toLowerCase()}" onclick="openEdit(${t.id},'task')">
      <td class="td-num">${i+1}</td>
      <td><div class="td-title">${t.title}${isOverdue?'<span style="color:#F87171;font-size:10px;margin-left:6px">OVERDUE</span>':''}</div><div class="td-desc">${t.desc||''}</div></td>
      ${extraCols(t)}
      <td>${priorityBadge(t.priority)}</td>
      <td>${statusBadge(t.status)}</td>
      <td style="color:var(--text2);white-space:nowrap;font-size:12px">${t.dueDate||'—'}</td>
      <td style="color:var(--text2);font-size:12px">${t.assignedTo||'—'}</td>
      <td><div class="row-actions">
        <button class="row-btn" onclick="event.stopPropagation();openEdit(${t.id},'task')">Edit</button>
        <button class="row-btn del" onclick="event.stopPropagation();deleteTask(${t.id})">Del</button>
      </div></td>
    </tr>`;
  }).join('')||`<tr><td colspan="9"><div class="empty-state"><div class="e-icon">📭</div><p>No tasks found.</p><button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add Task</button></div></td></tr>`;

  if(!withFilters) return`<div class="table-wrap"><table><thead><tr><th>#</th><th>Task</th>${extraCols(null)}<th>Priority</th><th>Status</th><th>Due Date</th><th>Assigned</th><th></th></tr></thead><tbody id="${tid}">${rows}</tbody></table></div>`;

  return`
  <div class="filters-row" style="margin-bottom:12px">
    <div class="search-box"><span style="color:var(--text3)">🔍</span><input id="${sid}" placeholder="Search…"/></div>
    <select class="filter-select" id="${fid}">
      <option value="all">All Status</option>
      <option>Pending</option><option>In Progress</option><option>Completed</option><option>Cancelled</option>
    </select>
    <span style="font-size:12px;color:var(--text3)">${tasks.length} task${tasks.length!==1?'s':''}</span>
  </div>
  <div class="table-wrap"><table><thead><tr><th>#</th><th>Task</th>${extraCols(null)}<th>Priority</th><th>Status</th><th>Due Date</th><th>Assigned</th><th></th></tr></thead><tbody id="${tid}">${rows}</tbody></table></div>`;
}

function filterTable(tid,search,status){
  document.querySelectorAll(`#${tid} tr[data-status]`).forEach(r=>{
    const ms=!search||r.dataset.search.includes(search.toLowerCase());
    const mf=status==='all'||r.dataset.status===status;
    r.style.display=ms&&mf?'':'none';
  });
}

function collectTask(){

function exportExcel(){
  const wb=XLSX.utils.book_new();

  // ── helper to style a sheet's header row ──
  function styleSheet(ws,nCols){
    // column widths
    ws['!cols']=Array(nCols).fill({wch:18});
    ws['!cols'][0]={wch:5};
    ws['!cols'][1]={wch:28};
  }

  // ── 1. All Tasks ──
  const TH=['#','Title','Description','Category','Priority','Status','Assigned To','Start Date','Due Date','Completed On','Linked To','Attachments','Notes','Cal ID','Cal Sync','Venue','Event Date','Pax','Budget','Content Type','Platform','Publish Date','Design Type','Dimensions','Colour Mode','Print Qty','Print Due','Vendor','Vendor Confirmed'];
  const TR=DB.tasks.map((t,i)=>[i+1,t.title,t.desc,t.category,t.priority,t.status,t.assignedTo,t.startDate,t.dueDate,t.completedOn,t.linkedTo,t.attachments,t.notes,t.calId,t.calSync,t.venue||'',t.eventDate||'',t.pax||'',t.budget||'',t.contentType||'',t.platform||'',t.publishDate||'',t.designType||'',t.dimensions||'',t.colorMode||'',t.printQty||'',t.printDueDate||'',t.vendor||'',t.vendorConfirmed||'']);
  const wsAll=XLSX.utils.aoa_to_sheet([TH,...TR]);
  styleSheet(wsAll,TH.length);
  XLSX.utils.book_append_sheet(wb,wsAll,'All Tasks');

  // ── 2. Events ──
  const EH=['#','Event Name','Description','Priority','Status','Assigned To','Event Date','Due Date','Completed On','Venue','Pax','Budget (RM)','Linked To','Attachments','Notes','Cal ID'];
  const ER=DB.tasks.filter(t=>t.category==='Event').map((t,i)=>[i+1,t.title,t.desc,t.priority,t.status,t.assignedTo,t.eventDate,t.dueDate,t.completedOn,t.venue,t.pax,t.budget,t.linkedTo,t.attachments,t.notes,t.calId]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([EH,...ER]),'Events');

  // ── 3. Social Media ──
  const SH=['#','Title','Description','Content Type','Platform','Priority','Status','Assigned To','Publish Date','Due Date','Completed On','Linked Campaign','Notes','Attachments','Cal ID'];
  const SR=DB.tasks.filter(t=>t.category==='Social Media').map((t,i)=>[i+1,t.title,t.desc,t.contentType,t.platform,t.priority,t.status,t.assignedTo,t.publishDate,t.dueDate,t.completedOn,t.linkedTo,t.notes,t.attachments,t.calId]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([SH,...SR]),'Social Media & Video');

  // ── 4. Design & Print ──
  const DH=['#','Job Title','Description','Design Type','Priority','Status','Assigned To','Linked To','Design Due','Print Due','Dimensions','Colour Mode','Print Qty','Vendor','Vendor Confirmed','Notes'];
  const DR=DB.tasks.filter(t=>t.category==='Design & Print').map((t,i)=>[i+1,t.title,t.desc,t.designType,t.priority,t.status,t.assignedTo,t.linkedTo,t.dueDate,t.printDueDate,t.dimensions,t.colorMode,t.printQty,t.vendor,t.vendorConfirmed,t.notes]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([DH,...DR]),'Design & Print');

  // ── 5. Notes ──
  const NH=['#','Note / To-Do','Type','Priority','Status','Related To','Date Added','Follow-Up Date','Done?','Details'];
  const NR=DB.notes.map((n,i)=>[i+1,n.note,n.type,n.priority,n.status,n.relatedTo,n.dateAdded,n.followUpDate,n.done,n.details]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([NH,...NR]),'Notes & To-Do');

  // ── 6. Vendors ──
  const VH=['#','Vendor Name','Contact','Service','Phone','Email','Address','Website','Price Range','Rating','Last Used','Used For','Payment Terms','Notes'];
  const VR=DB.vendors.map((v,i)=>[i+1,v.name,v.contact,v.service,v.phone,v.email,v.address,v.website,v.priceRange,v.rating,v.lastUsed,v.usedFor,v.paymentTerms,v.notes]);
  XLSX.utils.book_append_sheet('Vendor Contacts',XLSX.utils.aoa_to_sheet([VH,...VR]));

  // ── 7. Monthly Analysis ──
  const years=[...new Set(DB.tasks.map(t=>{ const d=getTaskDate(t); return d?new Date(d).getFullYear():null; }).filter(Boolean))].sort();
  const maRows=[['Monthly Task Analysis','','','','','','','',''],[''],
    ['Month','Year','Total Tasks','Completed','In Progress','Pending','Cancelled','Completion %','Events','Social Media','Design & Print']
  ];
  years.forEach(yr=>{
    for(let m=0;m<12;m++){
      const tasks=DB.tasks.filter(t=>{
        const d=getTaskDate(t);if(!d)return false;
        const dt=new Date(d);return dt.getFullYear()===yr&&dt.getMonth()===m;
      });
      if(tasks.length===0)return;
      const k=getKPIs(tasks);
      maRows.push([
        MONTHS[m],yr,k.total,k.done,k.prog,k.pend,k.canc,
        k.total?Math.round(k.done/k.total*100)+'%':'0%',
        k.events,k.social,k.design
      ]);
    }
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(maRows),'Monthly Analysis');

  // ── 8. Summary Dashboard ──
  const k=getKPIs(DB.tasks);
  const today=new Date();today.setHours(0,0,0,0);
  const overdue=DB.tasks.filter(t=>!['Completed','Cancelled','Printed'].includes(t.status)&&t.dueDate&&new Date(t.dueDate)<today);
  const sdRows=[
    ['WORKFLOW TASK MANAGER — SUMMARY REPORT',''],
    ['Exported on',new Date().toLocaleDateString('en-MY',{day:'2-digit',month:'long',year:'numeric'})],
    [''],
    ['OVERALL SUMMARY',''],
    ['Total Tasks',k.total],
    ['Completed',k.done],
    ['In Progress',k.prog],
    ['Pending',k.pend],
    ['Cancelled',k.canc],
    ['Completion Rate',k.total?Math.round(k.done/k.total*100)+'%':'0%'],
    ['Overdue Tasks',overdue.length],
    [''],
    ['BY CATEGORY',''],
    ['Events',k.events],
    ['Social Media & Video',k.social],
    ['Design & Print',k.design],
    [''],
    ['BY PRIORITY',''],
    ['High Priority',DB.tasks.filter(t=>t.priority==='High').length],
    ['Medium Priority',DB.tasks.filter(t=>t.priority==='Medium').length],
    ['Low Priority',DB.tasks.filter(t=>t.priority==='Low').length],
    [''],
    ['OVERDUE TASKS',''],
    ['Title','Due Date','Category','Priority','Status'],
    ...overdue.map(t=>[t.title,t.dueDate,t.category,t.priority,t.status]),
    [''],
    ['VENDOR SUMMARY',''],
    ['Total Vendors',DB.vendors.length],
    ...['Printing','Photography','Videography'].map(s=>[s+' vendors',DB.vendors.filter(v=>v.service===s).length]),
    ['Other vendors',DB.vendors.filter(v=>!['Printing','Photography','Videography'].includes(v.service)).length],
  ];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sdRows),'Summary Report');

  const date=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`WorkTaskManager_${date}.xlsx`);
  showToast('Excel exported — 8 sheets!','success');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
</script>
</body>
</html>
